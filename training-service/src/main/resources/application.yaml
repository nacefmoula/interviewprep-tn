server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: training-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/myapp-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/myapp-realm/protocol/openid-connect/certs}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trainingdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:0000}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: training-service
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,actuator

logging:
  level:
    org.springframework.security: INFO

training:
  debug:
    badge-simulation-enabled: ${TRAINING_DEBUG_BADGE_SIMULATION_ENABLED:false}

  ai:
    generation-enabled: ${TRAINING_AI_GENERATION_ENABLED:true}
    lesson-rerank-enabled: ${TRAINING_AI_LESSON_RERANK_ENABLED:true}

googleai:
  base-url: ${GOOGLE_AI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${GOOGLE_AI_API_KEY:}
  model: ${GOOGLE_AI_MODEL:gemini-2.5-flash}
  fallback-models: ${GOOGLE_AI_FALLBACK_MODELS:gemini-flash-lite-latest}
  temperature: ${GOOGLE_AI_TEMPERATURE:0.4}
  max-output-tokens: ${GOOGLE_AI_MAX_OUTPUT_TOKENS:900}

groq:
  api-key: ${GROQ_API_KEY}
  model: llama-3.1-8b-instant
