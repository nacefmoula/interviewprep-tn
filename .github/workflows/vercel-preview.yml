name: Vercel — Preview

on:
  # Vercel preview deploy requires VERCEL_TOKEN / org / project secrets.
  # Manual-only here so the public repo's PR checks stay green.
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write          # post / update the preview-URL comment

env:
  VERCEL_ORG_ID: team_tQYcRewNfvSBGAbsE6wJwcop
  VERCEL_PROJECT_ID: prj_2vhl5NT0TAWAQZkKNWPm3UKs25HL

jobs:
  deploy:
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project (preview env)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (preview, prebuilt)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: vercel-preview
          message: |
            🟢 **Vercel preview deployed**

            URL: ${{ steps.deploy.outputs.url }}

            Commit: `${{ github.sha }}`
            Triggered by: @${{ github.actor }}
