name: CI — Python service (reusable)

on:
  workflow_call:
    inputs:
      service:
        description: "Folder name of the Python service"
        type: string
        required: false
        default: "ai-training-path"
      python:
        description: "Python version"
        type: string
        required: false
        default: "3.12"

permissions:
  contents: read

jobs:
  build:
    name: build-${{ inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python }}
          cache: pip
          cache-dependency-path: ${{ inputs.service }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compile all .py)
        run: python -m compileall -q .

      - name: Smoke import the FastAPI app
        run: python -c "import app; print('app module loads ok')"

      - name: Run pytest (if any tests exist)
        run: |
          if find . -maxdepth 3 -path ./venv -prune -o -name "test_*.py" -print -o -name "*_test.py" -print | grep -q .; then
            pip install pytest
            pytest -q --maxfail=5
          else
            echo "No project tests found — skipping pytest."
          fi
