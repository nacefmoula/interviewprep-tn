name: CodeQL

on:
  push:
    branches: [main, "deployment/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"        # Mondays 05:00 UTC — catch newly-disclosed CVE patterns

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write       # upload SARIF to GH code-scanning
  actions: read

jobs:
  analyze:
    name: analyze-${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # build-mode: none — source-only analysis. This is a 7-pom
          # monorepo with no root aggregator, so CodeQL autobuild can't
          # build Java; `none` scans the source directly (full security
          # query coverage, no build wrangling).
          - language: java-kotlin
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
