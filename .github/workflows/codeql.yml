name: CodeQL

on:
  push:
    branches: [main, "deployment/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"        # Mondays 05:00 UTC — catch newly-disclosed CVE patterns

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write       # upload SARIF to GH code-scanning
  actions: read

jobs:
  analyze:
    name: analyze-${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      # Build a representative Spring service so CodeQL can analyse Java.
      # Pick user-service — it has tests + is on Java 21.
      - name: Autobuild Java
        if: matrix.language == 'java-kotlin'
        working-directory: user-service
        run: mvn -B -ntp -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
