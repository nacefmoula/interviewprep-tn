name: IaC scan

on:
  pull_request:
    paths:
      - "k8s/**"
      - "infra/openstack/**"
      - "infra/docker-compose.yml"
      - ".github/workflows/iac-scan.yml"
  push:
    branches: [main, "deployment/**"]
    paths:
      - "k8s/**"
      - "infra/openstack/**"

concurrency:
  group: iac-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  trivy-config:
    name: trivy config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan (Kubernetes manifests)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: k8s/
          format: sarif
          output: trivy-k8s.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"                # report only — don't block PRs on day 1

      - name: Trivy config scan (OpenStack Heat + docker-compose)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/
          format: sarif
          output: trivy-infra.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload SARIF (k8s)
        if: always()
        # Report-only workflow: a forbidden code-scanning upload (repo without
        # GHAS / "Resource not accessible by integration") must not red the
        # check — the scan ran and the SARIF is archived as an artifact below.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

      - name: Upload SARIF (infra)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-infra.sarif
          category: trivy-infra

      - name: Archive raw SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-sarif
          path: |
            trivy-k8s.sarif
            trivy-infra.sarif
          retention-days: 14

  kube-linter:
    name: kube-linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: kube-linter scan
        uses: stackrox/kube-linter-action@v1
        with:
          directory: k8s/
          format: sarif
          output-file: kube-linter.sarif
        continue-on-error: true        # day 1: report only

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kube-linter.sarif
          category: kube-linter
