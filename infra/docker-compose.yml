services:
  postgres:
    image: postgres:16-alpine
    container_name: userservice-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: userservice-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: userservice-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devpassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: userservice-mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: userservice-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeperdata:/var/lib/zookeeper/data
      - zookeeperlog:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: userservice-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/29092' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: userservice-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Création des topics Kafka...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.created --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.updated --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.deleted --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.role-changed --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.verified --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.suspended --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.events.DLQ --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic interview.session.completed --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic training.path.created --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic training.path.updated --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.badge.earned --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic resource.created --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic resource.updated --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic resource.deleted --partitions 2 --replication-factor 1
      echo 'Topics créés :'
      kafka-topics --list --bootstrap-server kafka:29092
      "

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: userservice-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-devpassword}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_FRONTEND_URL: "http://localhost:8080"
      KC_THEME_CACHE: "false"
      KC_TEMPLATE_CACHE: "false"
      KC_PROXY: edge
      KC_HOSTNAME_URL: "http://localhost:8080"
      JAVA_OPTS_APPEND: "-Xmx512m -XX:MaxMetaspaceSize=192m"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./keycloak/themes/interv:/opt/keycloak/themes/interv
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /realms/master HTTP/1.1\\r\\nHost: localhost:8080\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"realm\"'",
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  ollama:
    image: ollama/ollama:latest
    container_name: userservice-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: userservice-ollama-init
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    # `ollama pull` resumes interrupted blob downloads, so a retry loop
    # tolerates flaky networks. Without this, a single hiccup leaves the
    # volume empty and CV auto-fill silently breaks for new users.
    command: >
      "sleep 5;
       attempt=1;
       until ollama list 2>/dev/null | grep -q '^llama3.2:3b'; do
         echo \"[ollama-init] pull attempt $$attempt for llama3.2:3b\";
         ollama pull llama3.2:3b || echo \"[ollama-init] pull failed (will retry)\";
         attempt=$$((attempt+1));
         if [ $$attempt -gt 20 ]; then
           echo '[ollama-init] giving up after 20 attempts';
           exit 1;
         fi;
         sleep 5;
       done;
       echo '[ollama-init] llama3.2:3b ready'"

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: userservice-whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WHISPER__MODEL: Systran/faster-whisper-small
    volumes:
      - whisperdata:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  kokoro:
    build:
      context: ../kokoro
      dockerfile: Dockerfile
    image: clouddoom/kokoro-patched:local
    container_name: userservice-kokoro
    restart: unless-stopped
    ports:
      - "8880:8880"
    volumes:
      - kokorodata:/var/lib/kokoro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8880/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5m # patched startup watchdog is 1200s

  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: userservice-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    volumes:
      - uploadsdata:/app/uploads
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_CLIENT_ID: user-service
      KEYCLOAK_CLIENT_SECRET: user-service-secret-change-in-prod
      # Master-realm admin creds — used by UserService.updateRole to sync
      # the user's realm role into Keycloak when role changes in our DB.
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      APP_OLLAMA_BASE_URL: http://ollama:11434
      APP_OLLAMA_MODEL: llama3.2:3b
      APP_OLLAMA_TIMEOUT_SECONDS: 300

      # AI (Google AI Studio / Gemini) — set these in your shell or an uncommitted infra/.env file
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-flash-latest}
      GOOGLE_AI_FALLBACK_MODELS: ${GOOGLE_AI_FALLBACK_MODELS:-gemini-flash-lite-latest}
      GOOGLE_AI_BASE_URL: ${GOOGLE_AI_BASE_URL:-https://generativelanguage.googleapis.com}
      GOOGLE_AI_TEMPERATURE: ${GOOGLE_AI_TEMPERATURE:-0.4}
      GOOGLE_AI_MAX_OUTPUT_TOKENS: ${GOOGLE_AI_MAX_OUTPUT_TOKENS:-600}
      JAVA_TOOL_OPTIONS: "-Xmx384m -XX:MaxMetaspaceSize=320m -XX:+UseSerialGC -Xss512k"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  interview-service:
    build:
      context: ../interview-service
      dockerfile: Dockerfile
    container_name: userservice-interview-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${INTERVIEW_SERVICE_PORT:-8082}:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interviewdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_CLIENT_ID: interview-service
      KEYCLOAK_CLIENT_SECRET: interview-service-secret-change-in-prod
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com}
      APP_TTS_KOKORO_BASE_URL: http://kokoro:8880
      WHISPER_BASE_URL: http://whisper:8000
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
      JAVA_TOOL_OPTIONS: "-Xmx256m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  quiz-service:
    build:
      context: ../quiz-service
      dockerfile: Dockerfile
    container_name: userservice-quiz-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quizdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      USER_SERVICE_BASE_URL: http://user-service:8081
      JAVA_TOOL_OPTIONS: "-Xmx192m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    dns:
      - "8.8.8.8"
      - "8.8.4.4"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NG_CONFIGURATION: development
    container_name: userservice-frontend
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  training-service:
    build:
      context: ../training-service
      dockerfile: Dockerfile
    container_name: userservice-training-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${TRAINING_SERVICE_PORT:-8083}:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trainingdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_CLIENT_ID: training-service
      KEYCLOAK_CLIENT_SECRET: training-service-secret-change-in-prod
      TRAINING_DEBUG_BADGE_SIMULATION_ENABLED: "true"
      AI_MODEL_URL: http://ai-training-path:8000/predict-path

      # AI (Ollama) — drafts + reranking in training-service
      APP_OLLAMA_BASE_URL: http://ollama:11434
      APP_OLLAMA_MODEL: llama3.2:3b
      APP_OLLAMA_TIMEOUT_SECONDS: 300
      JAVA_TOOL_OPTIONS: "-Xmx192m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ai-training-path:
    build:
      context: ../ai-training-path
      dockerfile: Dockerfile
    container_name: userservice-ai-training-path
    restart: unless-stopped
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  community-service:
    build:
      context: ../community-service
      dockerfile: Dockerfile
    container_name: userservice-community-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${COMMUNITY_SERVICE_PORT:-8086}:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: communitydb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      JAVA_TOOL_OPTIONS: "-Xmx192m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    dns:
      - "8.8.8.8"
      - "8.8.4.4"

  minio:
    image: minio/minio:latest
    container_name: userservice-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  resource-service:
    build:
      context: ../resource-service
      dockerfile: Dockerfile
    container_name: userservice-resource-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${RESOURCE_SERVICE_PORT:-8087}:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resourcedb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: resource-library
      USER_SERVICE_BASE_URL: http://user-service:8081
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama3-8b-8192}
      AI_PROVIDER: ${AI_PROVIDER:-stub}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      JAVA_TOOL_OPTIONS: "-Xmx192m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8087/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    dns:
      - "8.8.8.8"
      - "8.8.4.4"

  mentorship-service:
    build:
      context: ../mentorship-service
      dockerfile: Dockerfile
    container_name: userservice-mentorship
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${MENTORSHIP_SERVICE_PORT:-8084}:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mentorship_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/realms/${KC_REALM_NAME:-myapp-realm}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM_NAME:-myapp-realm}/protocol/openid-connect/certs

      # SMTP (Mailtrap) - manual test endpoint /api/emails/test
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-no-reply@pi-clouddoom.local}
      MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # AI (Gemini) — set GEMINI_API_KEY in infra/.env (not committed) or your shell
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Optional override: set GEMINI_API_URL to switch models/endpoints (e.g. gemini-1.5-flash).
      # Keep a non-empty default to avoid misconfiguring the client.
      GEMINI_API_URL: "${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}"

      # AI (OpenAI) — optional fallback when Gemini is quota'd/unavailable
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_API_URL: "${GROQ_API_URL:-https://api.groq.com/openai/v1/chat/completions}"
      JAVA_TOOL_OPTIONS: "-Xmx192m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"

volumes:
  pgdata:
  redisdata:
  kafkadata:
  zookeeperdata:
  zookeeperlog:
  ollamadata:
  uploadsdata:
  whisperdata:
  kokorodata:
  miniodata:
networks:
  default:
    name: userservice-network
