# Same RBAC pattern as k8s/rbac/cicd-deployer.yaml but scoped to the
# piclouddoom-dev namespace.
#
# Apply once on k8s-cp1, AFTER applying k8s/base/namespace-dev.yaml:
#   kubectl apply -f k8s/rbac/cicd-deployer-dev.yaml
#   NAMESPACE=piclouddoom-dev bash scripts/extract-kubeconfig.sh > /tmp/kubeconfig-dev.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cicd-deployer
  namespace: piclouddoom-dev
---
apiVersion: v1
kind: Secret
metadata:
  name: cicd-deployer-token
  namespace: piclouddoom-dev
  annotations:
    kubernetes.io/service-account.name: cicd-deployer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cicd-deployer
  namespace: piclouddoom-dev
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/status", "deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cicd-deployer
  namespace: piclouddoom-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cicd-deployer
subjects:
  - kind: ServiceAccount
    name: cicd-deployer
    namespace: piclouddoom-dev
