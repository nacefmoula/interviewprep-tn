apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: piclouddoom
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: piclouddoom-cors-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: api.interviewprep-tn.me
      http:
        paths:
          # user-service
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/public
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/me
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081

          # training-service
          - path: /api/v1/admin/training
            pathType: Prefix
            backend:
              service:
                name: training-service
                port:
                  number: 8083
          - path: /api/v1/training
            pathType: Prefix
            backend:
              service:
                name: training-service
                port:
                  number: 8083

          # mentorship-service
          - path: /api/mentor-requests
            pathType: Prefix
            backend:
              service:
                name: mentorship-service
                port:
                  number: 8084
          - path: /api/recommendations
            pathType: Prefix
            backend:
              service:
                name: mentorship-service
                port:
                  number: 8084
          - path: /api/mentor-ratings
            pathType: Prefix
            backend:
              service:
                name: mentorship-service
                port:
                  number: 8084
          - path: /api/emails
            pathType: Prefix
            backend:
              service:
                name: mentorship-service
                port:
                  number: 8084
          - path: /api/mentor-sessions
            pathType: Prefix
            backend:
              service:
                name: mentorship-service
                port:
                  number: 8084

          # quiz-service
          - path: /api/quizzes
            pathType: Prefix
            backend:
              service:
                name: quiz-service
                port:
                  number: 8085
          - path: /api/attempts
            pathType: Prefix
            backend:
              service:
                name: quiz-service
                port:
                  number: 8085

          # interview-service
          - path: /api/interview-sessions
            pathType: Prefix
            backend:
              service:
                name: interview-service
                port:
                  number: 8082
          - path: /api/live-interviews
            pathType: Prefix
            backend:
              service:
                name: interview-service
                port:
                  number: 8082
          - path: /api/live-voice
            pathType: Prefix
            backend:
              service:
                name: interview-service
                port:
                  number: 8082
          - path: /api/progress
            pathType: Prefix
            backend:
              service:
                name: interview-service
                port:
                  number: 8082
          - path: /api/avatar
            pathType: Prefix
            backend:
              service:
                name: interview-service
                port:
                  number: 8082
          - path: /api/questions
            pathType: Prefix
            backend:
              service:
                name: interview-service
                port:
                  number: 8082

          # resource-service
          - path: /api/resources
            pathType: Prefix
            backend:
              service:
                name: resource-service
                port:
                  number: 8087

          # community-service
          - path: /api/community
            pathType: Prefix
            backend:
              service:
                name: community-service
                port:
                  number: 8086
