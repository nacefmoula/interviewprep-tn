apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentorship-service
  namespace: piclouddoom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mentorship-service
  template:
    metadata:
      labels:
        app: mentorship-service
    spec:
      enableServiceLinks: false
      containers:
        - name: mentorship-service
          image: docker.io/azizbna/pi-clouddoom-mentorship-service:fixed
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084

          env:
            # Database override: application.yml has localhost by default
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/mentorship_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD

            # Keycloak override: application.yml has localhost by default
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI

            # Mail
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_PASSWORD
            - name: APP_EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_EMAIL_FROM

            # AI providers
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GEMINI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_API_KEY
            - name: GROQ_MODEL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_MODEL

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 24

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mentorship-service
  namespace: piclouddoom
spec:
  selector:
    app: mentorship-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
