apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-service
  namespace: piclouddoom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-service
  template:
    metadata:
      labels:
        app: training-service
    spec:
      enableServiceLinks: false
      containers:
        - name: training-service
          image: docker.io/azizbna/pi-clouddoom-training-service:fixed
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083

          env:
            - name: SERVER_PORT
              value: "8083"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/trainingdb"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD

            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KEYCLOAK_ISSUER_URI
            - name: KEYCLOAK_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KEYCLOAK_JWK_SET_URI

            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            - name: TRAINING_DEBUG_BADGE_SIMULATION_ENABLED
              value: "false"
            - name: TRAINING_AI_GENERATION_ENABLED
              value: "true"
            - name: TRAINING_AI_LESSON_RERANK_ENABLED
              value: "true"

            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GOOGLE_AI_API_KEY
            - name: GOOGLE_AI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GOOGLE_AI_BASE_URL
            - name: GOOGLE_AI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GOOGLE_AI_MODEL
            - name: GOOGLE_AI_FALLBACK_MODELS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GOOGLE_AI_FALLBACK_MODELS
            - name: GOOGLE_AI_TEMPERATURE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GOOGLE_AI_TEMPERATURE
            - name: GOOGLE_AI_MAX_OUTPUT_TOKENS
              value: "900"

            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_API_KEY

            - name: AI_MODEL_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AI_MODEL_URL

            - name: APP_OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_OLLAMA_BASE_URL
            - name: APP_OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_OLLAMA_MODEL
            - name: APP_OLLAMA_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_OLLAMA_TIMEOUT_SECONDS

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "700m"
              memory: "1Gi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 24

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: training-service
  namespace: piclouddoom
spec:
  selector:
    app: training-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
