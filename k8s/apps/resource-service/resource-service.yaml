apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-service
  namespace: piclouddoom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-service
  template:
    metadata:
      labels:
        app: resource-service
    spec:
      enableServiceLinks: false
      containers:
        - name: resource-service
          image: docker.io/azizbna/pi-clouddoom-resource-service:fixed
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8087

          env:
            - name: SERVER_PORT
              value: "8087"

            # Database
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/resourcedb"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD

            # Keycloak
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KEYCLOAK_ISSUER_URI
            - name: KEYCLOAK_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KEYCLOAK_JWK_SET_URI

            # Redis
            - name: SPRING_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_REDIS_HOST
            - name: SPRING_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_REDIS_PORT
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD

            # Kafka
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS

            # MinIO
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"
            - name: MINIO_PUBLIC_ENDPOINT
              value: "http://minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET
              value: "resource-library"

            # Internal service URL
            - name: USER_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_SERVICE_BASE_URL

            # Keep resource generation deterministic and lightweight for now
            - name: AI_PROVIDER
              value: "stub"
            - name: AI_AUTOSEED_ENABLED
              value: "true"

            # Optional future Ollama path
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_OLLAMA_MODEL
            - name: OLLAMA_TIMEOUT_MS
              value: "20000"

            # Groq fallback values
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_API_KEY
            - name: GROQ_MODEL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_MODEL

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 24

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: resource-service
  namespace: piclouddoom
spec:
  selector:
    app: resource-service
  ports:
    - name: http
      port: 8087
      targetPort: 8087
