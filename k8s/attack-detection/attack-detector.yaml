apiVersion: apps/v1
kind: Deployment
metadata:
  name: attack-detector
  namespace: attack-detection
  labels:
    app: attack-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attack-detector
  template:
    metadata:
      labels:
        app: attack-detector
    spec:
      containers:
        - name: attack-detector
          image: docker.io/azizbna/pi-clouddoom-attack-detector:simulate-v1
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: FEATURE_MODE
              value: "simulate"
            - name: METRICS_PORT
              value: "8000"
            - name: INTERVAL_SECONDS
              value: "15"
            - name: TARGET_NAMESPACE
              value: "piclouddoom"
            - name: TARGET_SERVICE
              value: "all-piclouddoom-services"
            - name: ATTACK_THRESHOLD
              value: "0.70"
            - name: ATTACK_EVERY_N_CYCLES
              value: "8"
            - name: DETECTOR_VERSION
              value: "simulate-v1"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: attack-detector
  namespace: attack-detection
  labels:
    app: attack-detector
spec:
  type: ClusterIP
  selector:
    app: attack-detector
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
