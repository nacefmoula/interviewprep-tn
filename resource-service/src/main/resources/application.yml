server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: resource-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/myapp-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/myapp-realm/protocol/openid-connect/certs}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resourcedb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:0000}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: resource-service-pool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
    validate-on-migrate: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:devpassword}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 260MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:resource-library}

services:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

ai:
  autoseed:
    enabled: ${AI_AUTOSEED_ENABLED:true}
    category-count: ${AI_AUTOSEED_CATEGORY_COUNT:18}
    resources-per-category: ${AI_AUTOSEED_RESOURCES_PER_CATEGORY:4}
  generation:
    provider: ${AI_PROVIDER:stub} # stub | ollama | openai
    default-count: ${AI_DEFAULT_COUNT:5}
    fallback-to-stub: ${AI_FALLBACK_TO_STUB:true}
    schedule-enabled: ${AI_SCHEDULE_ENABLED:false}
    cron: ${AI_CRON:0 0 3 * * *}
    batch-size: ${AI_BATCH_SIZE:5}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_TEMPERATURE:0.7}
      timeout-ms: ${OPENAI_TIMEOUT_MS:20000}
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1/chat/completions}
      model: ${GROQ_MODEL:llama3-8b-8192}
      temperature: ${GROQ_TEMPERATURE:0.4}
      timeout-ms: ${GROQ_TIMEOUT_MS:15000}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}
  timeout-ms: ${OLLAMA_TIMEOUT_MS:20000}
