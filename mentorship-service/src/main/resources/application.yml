server:
  port: 8084

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mentorship_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Existing Hibernate-created DBs have no flyway history: baseline them
    # at V1 instead of trying to re-create the tables.
    baseline-on-migrate: true
    baseline-version: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/myapp-realm
          jwk-set-uri: http://localhost:8080/realms/myapp-realm/protocol/openid-connect/certs

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    openfeign:
      client:
        config:
          user-service:
            connectTimeout: 3000
            readTimeout: 5000

services:
  user-service:
    base-url: ${USER_SERVICE_URL:http://user-service:8081}

app:
  email:
    from: ${APP_EMAIL_FROM:no-reply@pi-clouddoom.local}


gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
  model: ${GROQ_MODEL:llama-3.1-8b-instant}

